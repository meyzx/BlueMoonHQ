<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Moon HQ - Suministros</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Dancing+Script:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-darkest: #0d0721; --bg-dark: #130934; --bg-card: #180b47;
            --primary-dark: #25116f; --primary: #09041b; --primary-light: #4a21de;
            --accent-1-light: #b5de21; --text-muted: #96949e; --text-secondary: #bdbcc2; --text-primary: #e5e4e7;
        }

        body { background-color: var(--bg-darkest); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER & NAV */
        header {
            background-color: rgba(13, 7, 33, 0.95); padding: 20px 50px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary-dark);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Dancing Script', cursive; font-size: 24px; color: var(--text-primary); text-decoration: none; }
        nav a { color: var(--text-secondary); text-decoration: none; margin: 0 15px; font-family: 'JetBrains Mono', monospace; font-size: 14px; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--accent-1-light); }

        /* CARRITO ICON & PANEL */
        .cart-icon-container { position: relative; cursor: pointer; margin-right: 20px; }
        .cart-count { 
            position: absolute; top: -8px; right: -10px; background: var(--accent-1-light); 
            color: var(--bg-darkest); font-size: 10px; font-weight: bold; 
            padding: 2px 6px; border-radius: 10px; font-family: 'JetBrains Mono';
        }

        .cart-sidebar {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
            background: var(--bg-card); border-left: 1px solid var(--primary-light);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary-dark); padding-bottom: 15px; margin-bottom: 20px; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 13px; background: rgba(0,0,0,0.2); padding: 10px; }
        .cart-total { border-top: 1px solid var(--primary-dark); padding-top: 20px; font-family: 'JetBrains Mono'; color: var(--accent-1-light); }

        /* BOTONES TIENDA */
        .shop-container { padding: 40px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--bg-dark); border: 1px solid var(--bg-card); padding: 20px; position: relative; }
        .buy-btn {
            background: transparent; border: 1px solid var(--accent-1-light); color: var(--accent-1-light);
            padding: 8px 15px; font-family: 'JetBrains Mono'; cursor: pointer; width: 100%;
        }
        .buy-btn:hover { background: var(--accent-1-light); color: var(--bg-darkest); }

        .checkout-btn {
            background: var(--accent-1-light); color: var(--bg-darkest); border: none;
            padding: 15px; font-family: 'JetBrains Mono'; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px;
        }

        footer { background-color: var(--primary); padding: 30px 10%; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--primary-dark); margin-top: auto; }
        .icon-svg { width: 18px; height: 18px; fill: var(--text-muted); transition: 0.3s; }
        .icon-svg:hover { fill: var(--accent-1-light); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Blue Moon HQ</a>
        <nav>
            <a href="index.html">Sobre Nosotros</a>
            <a href="noticias.html">Noticias</a>
            <a href="tienda.html" class="active">Tienda</a>
            <a href="comunidad.html">Comunidad</a>
            <a href="contacto.html">Contacto</a>
        </nav>
        
        <div style="display: flex; align-items: center;">
            <div class="cart-icon-container" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="user-icon" onclick="document.getElementById('userPanel').classList.toggle('active')" style="cursor:pointer">👤</div>
        </div>

        <div class="user-panel" id="userPanel" style="display:none; position:absolute; top:70px; right:50px; background:var(--bg-card); padding:20px; border:1px solid var(--primary-light); z-index:3000;">
            <span id="displayUsername" style="color:var(--accent-1-light); font-family:'JetBrains Mono';">Invitado</span>
            <button id="logoutBtn" style="display:none; margin-top:10px; background:red; color:white; border:none; padding:5px; width:100%;">SALIR</button>
        </div>
    </header>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2 style="font-family:'JetBrains Mono'; font-size:18px; margin:0;">ADQUISICIONES</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            </div>
        <div class="cart-total">
            <div style="display:flex; justify-content:space-between;">
                <span>TOTAL:</span>
                <span id="cartTotal">0 ◈</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">FINALIZAR ORDEN</button>
        </div>
    </div>

    <main class="shop-container">
        <article class="product-card">
            <img src="https://via.placeholder.com/300x250/130934/4a21de?text=HOODIE+OMEGA" class="product-image" style="width:100%">
            <h3>Hoodie Protocolo 4.0</h3>
            <p style="font-size:12px; color:var(--text-muted)">Equipamiento táctico de algodón pesado.</p>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                <span style="color:var(--accent-1-light); font-weight:bold;">450 ◈</span>
                <button class="buy-btn" onclick="addToCart('Hoodie Protocolo 4.0', 450)">AGREGAR</button>
            </div>
        </article>

        <article class="product-card">
            <img src="https://via.placeholder.com/300x250/130934/b5de21?text=STICKERS" class="product-image" style="width:100%">
            <h3>Sticker Pack Digital</h3>
            <p style="font-size:12px; color:var(--text-muted)">20 diseños exclusivos de Skye y Silas.</p>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                <span style="color:var(--accent-1-light); font-weight:bold;">50 ◈</span>
                <button class="buy-btn" onclick="addToCart('Sticker Pack Digital', 50)">AGREGAR</button>
            </div>
        </article>
    </main>

    <footer>
        <span class="footer-logo">Blue Moon Staff</span>
        <div class="social-logos">
            <a href="https://x.com/blue_moon_staff" target="_blank"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            <a href="https://youtube.com/@bluemoonhq" target="_blank"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
        </div>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('hq_cart')) || [];

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
        }

        function addToCart(name, price) {
            cart.push({name, price});
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('hq_cart', JSON.stringify(cart));
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            
            cartItems.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                cartItems.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>${item.price} ◈ <button onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer;">[X]</button></span>
                    </div>
                `;
            });

            cartCount.innerText = cart.length;
            cartTotal.innerText = `${total} ◈`;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function checkout() {
            if(cart.length === 0) return alert("Tu terminal de carga está vacía.");
            alert("Orden enviada al Cuartel. Silas procesará tu solicitud pronto.");
            cart = [];
            updateCart();
            toggleCart();
        }

        // Inicializar al cargar
        updateCart();

        // Lógica de usuario básica
        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("agentes").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        document.getElementById('displayUsername').innerText = doc.data().username;
                        document.getElementById('logoutBtn').style.display = "block";
                    }
                });
            }
        });
    </script>
</body>
</html>
