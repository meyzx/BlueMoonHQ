<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Moon HQ - Tienda</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* (Mismos estilos que index.html pero con el grid de tienda) */
        :root { --bg-darkest: #0d0721; --bg-dark: #130934; --bg-card: #180b47; --primary-light: #4a21de; --accent-1-light: #b5de21; --text-primary: #e5e4e7; --text-secondary: #bdbcc2; --text-muted: #96949e; }
        body { background-color: var(--bg-darkest); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding-top: 80px; }
        
        header { background: rgba(13, 7, 33, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--primary-light); padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 80%; z-index: 1000; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--accent-1-light); cursor: pointer; }
        nav a { color: var(--text-secondary); text-decoration: none; margin-left: 20px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        nav a.active { color: var(--accent-1-light); }

        .shop-header { padding: 60px 10% 20px; text-align: center; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding: 0 10%; }
        .product-card { background: var(--bg-card); border: 1px solid var(--bg-dark); padding: 15px; position: relative; transition: 0.3s; }
        .product-card:hover { border-color: var(--accent-1-light); transform: translateY(-5px); }
        .price-tag { position: absolute; top: 25px; right: 25px; background: var(--accent-1-light); color: var(--bg-darkest); padding: 5px 10px; font-family: 'JetBrains Mono', monospace; font-weight: bold; }
        .buy-btn { width: 100%; background: transparent; border: 1px solid var(--primary-light); color: var(--text-primary); padding: 10px; font-family: 'JetBrains Mono', monospace; cursor: pointer; }
        .buy-btn:hover { background: var(--primary-light); }

        footer { background: #090516; border-top: 1px solid #180b47; padding: 40px 10% 20px; margin-top: 50px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">Blue Moon HQ</div>
    <nav>
        <a href="index.html">Sobre Nosotros</a>
        <a href="noticias.html">Noticias</a>
        <a href="historia.html">Historia</a>
        <a href="tienda.html" class="active">Tienda</a>
        <a href="exclusivo.html">🔒 Exclusivo</a>
        <a href="comunidad.html">Comunidad</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<div class="shop-header">
    <h1 style="font-family: 'JetBrains Mono';">SUMINISTROS HQ</h1>
    <p style="color: var(--text-muted);">EQUIPAMIENTO AUTORIZADO</p>
</div>

<div class="shop-grid">
    <div class="product-card">
        <div class="price-tag">$12.00</div>
        <div style="height:200px; background:#000; margin-bottom:15px;"></div>
        <h3>Pack Stickers</h3>
        <p style="font-size: 13px; color: var(--text-muted);">Logos de seguridad holográficos.</p>
        <button class="buy-btn">AÑADIR AL INVENTARIO</button>
    </div>
</div>

<footer>
    <div style="text-align:center; font-size:11px;">© 2026 Operación Blue Moon - Suministros Despachados</div>
</footer>

</body>
</html>
