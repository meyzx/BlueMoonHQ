<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Moon HQ - Rangos</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-darkest: #0d0721; --bg-card: #180b47;
            --primary-light: #4a21de; --accent-1-light: #b5de21;
            --text-primary: #e5e4e7; --text-muted: #96949e;
            --gold: #ffca28; --cyan: #00e5ff;
        }
        body { background-color: var(--bg-darkest); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding-top: 100px; }
        
        header { background: rgba(13, 7, 33, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--primary-light); padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 80%; z-index: 1000; }
        .logo { font-family: 'JetBrains Mono'; color: var(--accent-1-light); cursor: pointer; }
        nav a { color: #bdbcc2; text-decoration: none; margin-left: 20px; font-family: 'JetBrains Mono'; font-size: 14px; }

        .tier-header { text-align: center; padding: 40px 10%; }
        .tier-header h1 { font-family: 'JetBrains Mono'; font-size: 32px; margin-bottom: 10px; }
        
        .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 0 10% 50px; }
        
        .tier-card { 
            background: var(--bg-card); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 40px; 
            text-align: center; 
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Destacar el plan medio */
        .tier-card.featured { border: 2px solid var(--accent-1-light); transform: scale(1.05); z-index: 10; box-shadow: 0 0 30px rgba(181, 222, 33, 0.1); }
        .tier-card.pro { border-color: var(--cyan); }

        .tier-name { font-family: 'JetBrains Mono'; font-size: 20px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .tier-price { font-size: 36px; font-weight: bold; margin-bottom: 30px; font-family: 'JetBrains Mono'; }
        .tier-price span { font-size: 14px; color: var(--text-muted); }

        .tier-features { list-style: none; padding: 0; margin: 0 0 40px; text-align: left; flex-grow: 1; }
        .tier-features li { margin-bottom: 15px; font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; }
        .tier-features li::before { content: "▹"; color: var(--accent-1-light); margin-right: 10px; font-weight: bold; }

        .tier-btn { 
            background: transparent; 
            border: 1px solid var(--accent-1-light); 
            color: var(--accent-1-light); 
            padding: 15px; 
            text-decoration: none; 
            font-family: 'JetBrains Mono'; 
            font-weight: bold;
