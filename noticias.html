<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Moon HQ - Noticias</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-darkest: #0d0721; --bg-dark: #130934; --bg-card: #180b47; --primary-light: #4a21de; --accent-1-light: #b5de21; --text-primary: #e5e4e7; --text-muted: #96949e; }
        body { background-color: var(--bg-darkest); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding-top: 100px; }
        
        header { background: rgba(13, 7, 33, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--primary-light); padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 80%; z-index: 1000; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--accent-1-light); cursor: pointer; }
        nav a { color: #bdbcc2; text-decoration: none; margin-left: 20px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        nav a.active { color: var(--accent-1-light); }

        .news-container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .news-post { background: var(--bg-card); border-left: 4px solid var(--primary-light); padding: 30px; margin-bottom: 30px; }
        .news-post h2 { font-family: 'JetBrains Mono'; margin-top: 0; }
        .date { color: var(--accent-1-light); font-family: 'JetBrains Mono'; font-size: 12px; }
