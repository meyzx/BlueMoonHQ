<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Moon HQ - Reclutamiento</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-darkest: #0d0721; --bg-card: #180b47;
            --primary-light: #4a21de; --accent-1-light: #b5de21;
            --text-primary: #e5e4e7; --text-muted: #96949e;
            --danger: #ff4b4b;
        }
        body { 
            background-color: var(--bg-darkest); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO DE ESCANEO */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 33, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .reg-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            padding: 40px;
            border: 1px solid var(--primary-light);
            box-shadow: 0 0 30px rgba(74, 33, 222, 0.2);
            position: relative;
            z-index: 20;
        }

        .reg-header { text-align: center; margin-bottom: 30px; }
        .reg-header h1 { font-family: 'JetBrains Mono'; color: var(--accent-1-light); font-size: 22px; margin: 0; }
        .reg-header p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-family: 'JetBrains Mono'; font-size: 12px; margin-bottom: 8px; color: var(--text-muted); }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #2a1a5e;
            color: white;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-1-light);
            background: rgba(181, 222, 33, 0.05);
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-1-light);
            color: var(--accent-1-light);
            padding: 15px;
            font-family: 'JetBrains Mono';
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: var(--accent-1-light);
            color: var(--bg-darkest);
            box-shadow: 0 0 15px var(--accent-1-light);
        }

        .footer-note { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-muted); }
        .footer-note a { color: var(--primary-light); text-decoration: none; }
        
        .corner { position: absolute; width: 10px; height: 10px; border: 2px solid var(--accent-1-light); }
        .top-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-r { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="corner top-l"></div>
    <div class="corner top-r"></div>
    
    <div class="reg-header">
        <h1>RECLUTAMIENTO DE AGENTE</h1>
        <p>Protocolo de Inicio de Sesión</p>
    </div>

    <form id="registroForm">
        <div class="form-group">
            <label>> NOMBRE DE AGENTE (ALIAS)</label>
            <input type="text" id="regAlias" placeholder="Ej: Skye_01" required>
        </div>

        <div class="form-group">
            <label>> CORREO DE ENLACE</label>
            <input type="email" id="regEmail" placeholder="agente@inteligencia.com" required>
        </div>

        <div class="form-group">
            <label>> CLAVE DE ACCESO</label>
            <input type="password" id="regPass" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label>> ESPECIALIDAD DE CAMPO</label>
            <select id="regEspecialidad">
                <option>Inteligencia (Hacking)</option>
                <option>Logística (Suministros)</option>
                <option>Exploración (Historia)</option>
                <option>Combate (Moderación)</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">INICIAR ALTA DE DATOS</button>
    </form>

    <div class="footer-note">
        ¿Ya tienes credenciales? <a href="login.html">Acceder a la terminal</a>
    </div>
</div>

<script>
    const registroForm = document.getElementById('registroForm');

    registroForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const alias = document.getElementById('regAlias').value;
        const especialidad = document.getElementById('regEspecialidad').value;

        // Crear usuario en Authentication
        auth.createUserWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                const user = userCredential.user;
                
                // Guardar perfil en Firestore
                return db.collection("agentes").doc(user.uid).set({
                    username: alias,
                    email: email,
                    rank: "Recluta",
                    specialty: especialidad,
                    hasExclusiveAccess: false,
                    credits: 0,
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            })
            .then(() => {
                alert("AGENTE REGISTRADO: Bienvenido al Cuartel, " + alias);
                window.location.href = 'index.html';
            })
            .catch((error) => {
                let mensajeError = "Error en el sistema.";
                if(error.code === 'auth/email-already-in-use') mensajeError = "Este correo ya está registrado.";
                if(error.code === 'auth/weak-password') mensajeError = "La clave debe tener al menos 6 caracteres.";
                alert("FALLO EN ALTA: " + mensajeError);
            });
    });
</script>

</body>
</html>
