<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Moon HQ - Clasificado</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-darkest: #0d0721; --accent-1-light: #b5de21; --danger: #ff4b4b; --text-primary: #e5e4e7; }
        body { background-color: var(--bg-darkest); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding-top: 80px; }
        
        header { background: rgba(13, 7, 33, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--danger); padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 80%; z-index: 1000; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--danger); }
        nav a { color: #bdbcc2; text-decoration: none; margin-left: 20px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        nav a.active { color: var(--danger); }

        .exclusive-grid { display: flex; justify-content: center; padding: 100px 10%; }
        .file-card { width: 300px; height: 400px; background: #180b47; position: relative; overflow: hidden; border: 1px solid var(--danger); }
        .blur-bg { width: 100%; height: 100%; background: url('https://via.placeholder.com/300x400'); filter: blur(20px); opacity: 0.3; }
        .lock-overlay { position: absolute; top: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; text-align: center; padding: 20px; box-sizing: border-box; }
        
        .unlock-btn { border: 1px solid var(--accent-1-light); color: var(--accent-1-light); padding: 10px; text-decoration: none; margin-top: 20px; font-family: 'JetBrains Mono'; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CLÁSIFICADO</div>
    <nav>
        <a href="index.html">Sobre Nosotros</a>
        <a href="noticias.html">Noticias</a>
        <a href="historia.html">Historia</a>
        <a href="tienda.html">Tienda</a>
        <a href="exclusivo.html" class="active">🔒 Exclusivo</a>
        <a href="comunidad.html">Comunidad</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<div class="exclusive-grid">
    <div class="file-card">
        <div class="blur-bg"></div>
        <div class="lock-overlay">
            <span style="font-size: 40px;">🔒</span>
            <h3 style="font-family: 'JetBrains Mono'; color: var(--danger);">ACCESO DENEGADO</h3>
            <p style="font-size: 12px;">Se requiere rango de Agente de Campo para ver estos bocetos.</p>
            <a href="#" class="unlock-btn">SUBIR RANGO EN KO-FI</a>
        </div>
    </div>
</div>

</body>
</html>
